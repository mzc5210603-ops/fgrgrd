name: Ebook Scraper

on:
  schedule:
    # 每12小时执行一次 (UTC时间)
    - cron: '0 */12 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ebook scraper
        run: node scripts/main.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet public/books/books.json || echo "CHANGED=true" >> $GITHUB_ENV

      - name: Commit and push changes
        if: env.CHANGED == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/books/books.json
          git commit -m "Auto-update ebook catalog: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
