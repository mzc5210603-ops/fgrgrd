<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Free public domain ebooks catalog with online reader. Browse hundreds of classic literature, fiction, philosophy, science books in English and Japanese. Read online for free." />
    <meta name="keywords" content="ebooks, public domain, free books, online reader, classic literature, English ebooks, Japanese ebooks, 電子書籍, 公開ドメイン, 無料書籍, 古典文学" />
    <meta name="author" content="Ebook Library" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ebook Library - Free Public Domain Books" />
    <meta property="og:description" content="Browse hundreds of free public domain ebooks. Read classic literature, fiction, philosophy online. English and Japanese bilingual support." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ja_JP" />
    <meta property="og:site_name" content="Ebook Library" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ebook Library - Free Public Domain Books" />
    <meta name="twitter:description" content="Browse hundreds of free public domain ebooks in English and Japanese." />

    <!-- Canonical -->
    <link rel="canonical" href="/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ebook Library",
      "description": "Free public domain ebooks catalog with online reader",
      "url": "/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "/search/{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <title>Ebook Library - Free Public Domain Books</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
